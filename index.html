<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문호 스트레이독스 미궁괴담 카드 필터</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1e2330;
      --border: #2b3244;
      --text: #eef2ff;
      --muted: #a7b0c3;
      --accent: #7aa2ff;
      --accent-2: #9f7aea;
      --chip: #252c3a;
      --chip-on: #3d5fb8;
      --danger: #ff6b6b;
      --shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: Inter, Pretendard, "Noto Sans KR", system-ui, sans-serif; }
    body { min-height: 100vh; }

    .page {
      max-width: 1480px;
      margin: 0 auto;
      padding: 28px 18px 56px;
    }

    .hero {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .hero .summary {
      text-align: right;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.15fr .9fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .search-panel,
    .filter-panel {
      padding: 16px;
    }

    .search-grid {
      display: grid;
      grid-template-columns: 1fr 180px 180px;
      gap: 10px;
    }

    input[type="search"],
    select,
    input[type="text"] {
      width: 100%;
      height: 46px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #11151d;
      color: var(--text);
      padding: 0 14px;
      outline: none;
      font-size: 14px;
    }

    input[type="search"]:focus,
    select:focus,
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(122,162,255,.15);
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      height: 42px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 12px;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 700;
      transition: .18s ease;
    }

    button:hover { transform: translateY(-1px); }
    .primary-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      color: white;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .filter-group {
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,.02);
      border: 1px solid rgba(255,255,255,.04);
    }

    .filter-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .filter-title h3 {
      margin: 0;
      font-size: 14px;
      color: #f6f8ff;
    }

    .filter-title span {
      color: var(--muted);
      font-size: 12px;
    }

    .chip-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--chip);
      color: #dbe4ff;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      transition: .16s ease;
    }

    .chip:hover { border-color: var(--accent); }
    .chip.on {
      background: var(--chip-on);
      border-color: transparent;
      color: white;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 16px 0 14px;
      flex-wrap: wrap;
    }

    .status-left { color: var(--muted); font-size: 14px; }
    .status-right { display: flex; gap: 10px; align-items: center; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .card-top {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 14px;
      padding: 14px;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }

    .thumb-wrap {
      width: 92px;
      height: 92px;
      border-radius: 14px;
      background: linear-gradient(145deg, #202636, #131722);
      border: 1px solid rgba(255,255,255,.06);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-fallback {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 8px;
      line-height: 1.4;
    }

    .card-no {
      color: var(--accent);
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .card-name {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.28;
      margin-bottom: 8px;
    }

    .meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      font-size: 12px;
      color: #dfe6ff;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
    }

    .card-body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .skill-box {
      padding: 12px;
      background: rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 14px;
    }

    .skill-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .skill-name {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.35;
      margin-bottom: 6px;
      color: #f7f9ff;
    }

    .skill-text {
      font-size: 13px;
      color: #ced5e8;
      line-height: 1.55;
      word-break: keep-all;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .tag {
      display: inline-flex;
      min-height: 26px;
      padding: 0 9px;
      align-items: center;
      font-size: 12px;
      border-radius: 999px;
      background: rgba(122,162,255,.12);
      color: #d6e4ff;
      border: 1px solid rgba(122,162,255,.18);
    }

    .links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      text-decoration: none;
      color: white;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.08);
    }

    .empty {
      padding: 42px 18px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 18px;
      background: rgba(255,255,255,.015);
    }

    .source-box {
      margin-top: 14px;
      padding: 14px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .source-box code {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 8px;
      background: rgba(255,255,255,.06);
      color: #dfe7ff;
    }

    @media (max-width: 1180px) {
      .toolbar { grid-template-columns: 1fr; }
      .filters { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .search-grid { grid-template-columns: 1fr; }
      .hero { flex-direction: column; align-items: flex-start; }
      .hero .summary { text-align: left; }
      .card-top { grid-template-columns: 76px 1fr; }
      .thumb-wrap { width: 76px; height: 76px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div>
        <h1>문호 스트레이독스<br>미궁괴담 카드 필터</h1>
        <p>같은 필터 그룹 안에서는 OR, 서로 다른 그룹끼리는 AND로 동작합니다.</p>
      </div>
      <div class="summary" id="summaryTop">데이터 로딩 중...</div>
    </section>

    <section class="toolbar">
      <div class="panel search-panel">
        <div class="search-grid">
          <input id="searchInput" type="search" placeholder="카드명 / 캐릭터명 / 스킬명 / 스킬 설명 검색" />
          <select id="sortSelect">
            <option value="idAsc">번호 오름차순</option>
            <option value="idDesc">번호 내림차순</option>
            <option value="nameAsc">이름 오름차순</option>
            <option value="rarityDesc">등급 높은 순</option>
          </select>
          <select id="viewSelect">
            <option value="all">전체 보기</option>
            <option value="hasThumb">이미지 있는 카드만</option>
            <option value="hasLeader">리더 스킬 있는 카드만</option>
            <option value="hasActive">액티브 스킬 있는 카드만</option>
          </select>
        </div>
        <div class="actions">
          <button class="primary-btn" id="reloadBtn" type="button">데이터 다시 불러오기</button>
          <button id="resetBtn" type="button">필터 초기화</button>
          <button id="collapseBtn" type="button">필터 접기/펼치기</button>
        </div>
        <div class="source-box">
          현재 데이터 소스: <code id="sourceLabel"></code><br>
          나중에 구글 시트나 Apps Script URL로 바꿀 때는 아래 <code>CONFIG.DATA_URL</code>만 교체하면 됩니다.
        </div>
      </div>

      <div class="panel filter-panel" id="filterPanel">
        <div class="filters" id="filtersRoot"></div>
      </div>
    </section>

    <div class="status-bar">
      <div class="status-left" id="statusText">0건</div>
      <div class="status-right">
        <span class="pill" id="selectedCountPill">선택된 필터 0개</span>
      </div>
    </div>

    <section class="grid" id="cardGrid"></section>
  </div>

  <script>
    const CONFIG = {
      // 나중에 바꿀 부분
      DATA_URL: 'https://raw.githubusercontent.com/AtaraxyK/bungofilter/main/cards_sheet_ready.json',
      // 예: 'https://raw.githubusercontent.com/AtaraxyK/bungofilter/main/cards_sheet_ready.json'
      USE_FINAL_TAG_TEXT: true,
      IMAGE_FALLBACK_TEXT: '이미지 없음'
    };

    const FILTER_DEFS = [
      { key: 'rarity_group', label: '등급', options: ['R', 'SR', 'SSR', 'UR', 'EX'] },
      { key: 'type', label: '카드 타입', options: ['공격형', '지원형', '밸런스형', '특수형', '방어형'] },
      { key: 'attribute', label: '속성 타입', options: ['적[紅]속성', '청속성', '녹속성', '광속성', '암속성'] },
      { key: 'affiliation', label: '소속', options: ['무장 탐정사', '포트 마피아', '연합', '이능특무과', '미믹', '죽음의 집의 쥐', '무소속'] },
      { key: 'leader', label: '리더 스킬', options: ['팀원 전체 공증', '소속별 공증', '속성별 공증', '타입별 공증'] },
      { key: 'active', label: '액티브 스킬', options: ['단일 공격', '전체 공격', '전체 공증 버프', '속성별 공증 버프'] }
    ];

    const state = {
      cards: [],
      filtered: [],
      filters: {
        rarity_group: new Set(),
        type: new Set(),
        attribute: new Set(),
        affiliation: new Set(),
        leader: new Set(),
        active: new Set()
      },
      search: '',
      sort: 'idAsc',
      view: 'all',
      filterCollapsed: false
    };

    const $ = (sel) => document.querySelector(sel);

    function escapeHtml(str = '') {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function normalizeCard(card) {
      const leaderText = card.leader_tags_final_text || card.leader_tags_auto_text || '';
      const activeText = card.active_tags_final_text || card.active_tags_auto_text || '';

      const leaderArr = CONFIG.USE_FINAL_TAG_TEXT
        ? splitPipe(card.leader_tags_final_text || card.leader_tags_auto_text || '')
        : (Array.isArray(card.filter_leader) ? card.filter_leader : splitPipe(card.leader_tags_auto_text || ''));

      const activeArr = CONFIG.USE_FINAL_TAG_TEXT
        ? splitPipe(card.active_tags_final_text || card.active_tags_auto_text || '')
        : (Array.isArray(card.filter_active) ? card.filter_active : splitPipe(card.active_tags_auto_text || ''));

      return {
        ...card,
        id: String(card.id || '').padStart(4, '0'),
        no_jp: String(card.no_jp || card.id || '').padStart(4, '0'),
        rarity_group: card.rarity_group || '',
        type: card.type || '',
        attribute: card.attribute || '',
        affiliation: card.affiliation || '',
        name_jp: card.name_jp || '',
        character_name_jp: card.character_name_jp || '',
        title_jp: card.title_jp || '',
        thumb_url: card.thumb_url || '',
        leader_skill_name: card.leader_skill_name || '',
        leader_skill_raw: card.leader_skill_raw || '',
        active_skill_name: card.active_skill_name || '',
        active_skill_raw: card.active_skill_raw || '',
        filter_leader: leaderArr,
        filter_active: activeArr,
        leader_tags_display_text: leaderText,
        active_tags_display_text: activeText,
        searchBlob: [
          card.id,
          card.no_jp,
          card.name_jp,
          card.character_name_jp,
          card.character_name_en,
          card.title_jp,
          card.affiliation,
          card.attribute,
          card.type,
          card.leader_skill_name,
          card.leader_skill_raw,
          card.active_skill_name,
          card.active_skill_raw,
          leaderText,
          activeText
        ].join(' ').toLowerCase()
      };
    }

    function splitPipe(text) {
      if (!text) return [];
      return [...new Set(String(text).split('|').map(v => v.trim()).filter(Boolean))];
    }

    function getSelectedCount() {
      return FILTER_DEFS.reduce((sum, def) => sum + state.filters[def.key].size, 0);
    }

    function renderFilters() {
      const root = $('#filtersRoot');
      root.innerHTML = FILTER_DEFS.map(def => {
        const chips = def.options.map(opt => {
          const on = state.filters[def.key].has(opt) ? 'on' : '';
          return `<button class="chip ${on}" type="button" data-filter-key="${def.key}" data-filter-value="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`;
        }).join('');

        return `
          <section class="filter-group">
            <div class="filter-title">
              <h3>${escapeHtml(def.label)}</h3>
              <span>${state.filters[def.key].size}개 선택</span>
            </div>
            <div class="chip-wrap">${chips}</div>
          </section>
        `;
      }).join('');

      root.querySelectorAll('[data-filter-key]').forEach(btn => {
        btn.addEventListener('click', () => {
          const key = btn.dataset.filterKey;
          const value = btn.dataset.filterValue;
          const set = state.filters[key];
          if (set.has(value)) set.delete(value);
          else set.add(value);
          renderFilters();
          applyFilters();
        });
      });

      $('#selectedCountPill').textContent = `선택된 필터 ${getSelectedCount()}개`;
    }

    function matchesGroup(selectedSet, valueOrArray) {
      if (!selectedSet || selectedSet.size === 0) return true;

      if (Array.isArray(valueOrArray)) {
        return valueOrArray.some(v => selectedSet.has(v));
      }
      return selectedSet.has(valueOrArray);
    }

    function applyFilters() {
      const q = state.search.trim().toLowerCase();
      let result = state.cards.filter(card => {
        if (q && !card.searchBlob.includes(q)) return false;
        if (!matchesGroup(state.filters.rarity_group, card.rarity_group)) return false;
        if (!matchesGroup(state.filters.type, card.type)) return false;
        if (!matchesGroup(state.filters.attribute, card.attribute)) return false;
        if (!matchesGroup(state.filters.affiliation, card.affiliation)) return false;
        if (!matchesGroup(state.filters.leader, card.filter_leader)) return false;
        if (!matchesGroup(state.filters.active, card.filter_active)) return false;

        if (state.view === 'hasThumb' && !card.thumb_url) return false;
        if (state.view === 'hasLeader' && !card.leader_skill_raw) return false;
        if (state.view === 'hasActive' && !card.active_skill_raw) return false;

        return true;
      });

      result = sortCards(result, state.sort);
      state.filtered = result;
      renderCards();
      updateStatus();
    }

    function sortCards(cards, mode) {
      const arr = [...cards];
      const rarityWeight = { EX: 5, UR: 4, SSR: 3, SR: 2, R: 1 };

      switch (mode) {
        case 'idDesc':
          arr.sort((a, b) => Number(b.id) - Number(a.id));
          break;
        case 'nameAsc':
          arr.sort((a, b) => (a.name_jp || '').localeCompare(b.name_jp || '', 'ja'));
          break;
        case 'rarityDesc':
          arr.sort((a, b) => {
            const diff = (rarityWeight[b.rarity_group] || 0) - (rarityWeight[a.rarity_group] || 0);
            return diff || Number(a.id) - Number(b.id);
          });
          break;
        case 'idAsc':
        default:
          arr.sort((a, b) => Number(a.id) - Number(b.id));
          break;
      }
      return arr;
    }

    function renderCards() {
      const grid = $('#cardGrid');
      if (!state.filtered.length) {
        grid.innerHTML = `<div class="empty">조건에 맞는 카드가 없습니다.<br>검색어 또는 필터를 다시 확인해 주세요.</div>`;
        return;
      }

      grid.innerHTML = state.filtered.map(card => {
        const metaPills = [card.rarity_group, card.attribute, card.type, card.affiliation]
          .filter(Boolean)
          .map(v => `<span class="pill">${escapeHtml(v)}</span>`)
          .join('');

        const leaderTags = card.filter_leader.map(v => `<span class="tag">${escapeHtml(v)}</span>`).join('');
        const activeTags = card.filter_active.map(v => `<span class="tag">${escapeHtml(v)}</span>`).join('');

        const fandomBtn = card.fandom_url ? `<a class="link-btn" href="${escapeHtml(card.fandom_url)}" target="_blank" rel="noopener">Fandom</a>` : '';
        const gamerchBtn = card.gamerch_url ? `<a class="link-btn" href="${escapeHtml(card.gamerch_url)}" target="_blank" rel="noopener">Gamerch</a>` : '';

        return `
          <article class="card">
            <div class="card-top">
              <div class="thumb-wrap">
                ${card.thumb_url
                  ? `<img src="${escapeHtml(card.thumb_url)}" alt="${escapeHtml(card.name_jp || card.id)}" loading="lazy" onerror="this.remove(); this.parentNode.innerHTML='<div class=\'thumb-fallback\'>이미지<br>로드 실패</div>';">`
                  : `<div class="thumb-fallback">${CONFIG.IMAGE_FALLBACK_TEXT}</div>`}
              </div>
              <div>
                <div class="card-no">No.${escapeHtml(card.no_jp || card.id)}</div>
                <div class="card-name">${escapeHtml(card.name_jp || card.character_name_jp || card.id)}</div>
                <div class="meta-line">${metaPills}</div>
                <div class="links">${fandomBtn}${gamerchBtn}</div>
              </div>
            </div>

            <div class="card-body">
              <section class="skill-box">
                <div class="skill-label"><span>리더 스킬</span></div>
                <div class="skill-name">${escapeHtml(card.leader_skill_name || '정보 없음')}</div>
                <div class="skill-text">${escapeHtml(card.leader_skill_raw || '정보 없음')}</div>
                ${leaderTags ? `<div class="tag-row">${leaderTags}</div>` : ''}
              </section>

              <section class="skill-box">
                <div class="skill-label"><span>액티브 스킬</span></div>
                <div class="skill-name">${escapeHtml(card.active_skill_name || '정보 없음')}</div>
                <div class="skill-text">${escapeHtml(card.active_skill_raw || '정보 없음')}</div>
                ${activeTags ? `<div class="tag-row">${activeTags}</div>` : ''}
              </section>
            </div>
          </article>
        `;
      }).join('');
    }

    function updateStatus() {
      $('#statusText').textContent = `전체 ${state.cards.length}장 중 ${state.filtered.length}장 표시`;
      $('#summaryTop').textContent = `로딩 완료 · 총 ${state.cards.length}장`;
      $('#selectedCountPill').textContent = `선택된 필터 ${getSelectedCount()}개`;
    }

    async function loadCards() {
      $('#summaryTop').textContent = '데이터 불러오는 중...';
      $('#sourceLabel').textContent = CONFIG.DATA_URL;

      try {
        const res = await fetch(CONFIG.DATA_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error('JSON 최상위 구조가 배열이 아닙니다.');

        state.cards = data.map(normalizeCard);
        renderFilters();
        applyFilters();
      } catch (err) {
        $('#summaryTop').textContent = '데이터 로드 실패';
        $('#cardGrid').innerHTML = `
          <div class="empty">
            데이터를 불러오지 못했습니다.<br>
            <br>
            에러: ${escapeHtml(err.message || String(err))}<br>
            <br>
            <strong>확인할 것</strong><br>
            1. CONFIG.DATA_URL 주소가 raw JSON 주소인지<br>
            2. CORS 또는 공개 접근이 가능한지<br>
            3. JSON 최상위가 배열인지
          </div>
        `;
      }
    }

    function resetFilters() {
      FILTER_DEFS.forEach(def => state.filters[def.key].clear());
      state.search = '';
      state.sort = 'idAsc';
      state.view = 'all';
      $('#searchInput').value = '';
      $('#sortSelect').value = 'idAsc';
      $('#viewSelect').value = 'all';
      renderFilters();
      applyFilters();
    }

    function bindEvents() {
      $('#searchInput').addEventListener('input', (e) => {
        state.search = e.target.value;
        applyFilters();
      });

      $('#sortSelect').addEventListener('change', (e) => {
        state.sort = e.target.value;
        applyFilters();
      });

      $('#viewSelect').addEventListener('change', (e) => {
        state.view = e.target.value;
        applyFilters();
      });

      $('#resetBtn').addEventListener('click', resetFilters);
      $('#reloadBtn').addEventListener('click', loadCards);
      $('#collapseBtn').addEventListener('click', () => {
        state.filterCollapsed = !state.filterCollapsed;
        $('#filterPanel').style.display = state.filterCollapsed ? 'none' : 'block';
      });
    }

    bindEvents();
    renderFilters();
    loadCards();
  </script>
</body>
</html>
