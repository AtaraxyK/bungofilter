<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>문호 미궁괴담 카드 필터</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: #374151;
      --accent: #60a5fa;
      --accent-2: #93c5fd;
      --chip: #0b1220;
      --chip-on: #1d4ed8;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, var(--bg) 100%);
      color: var(--text);
    }

    .wrap {
      width: min(1400px, calc(100% - 24px));
      margin: 24px auto 40px;
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    .panel {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.25);
      backdrop-filter: blur(8px);
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.2fr 180px 150px 120px;
      gap: 10px;
      margin-bottom: 16px;
    }

    input[type="search"], select, button {
      width: 100%;
      border: 1px solid var(--line);
      background: #0b1220;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
    }

    button {
      cursor: pointer;
      background: #162033;
    }

    button:hover { border-color: var(--accent); }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .filter-group {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: rgba(11, 18, 32, 0.75);
    }

    .filter-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--accent-2);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--chip);
      color: var(--text);
      padding: 7px 10px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }

    .chip.active {
      background: var(--chip-on);
      border-color: var(--accent-2);
    }

    .summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 16px 0 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    .card {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .card-main {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 14px;
      padding: 14px;
    }

    .thumb {
      width: 96px;
      height: 96px;
      border-radius: 12px;
      border: 1px solid var(--line);
      overflow: hidden;
      background: #0b1220;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-empty {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 8px;
    }

    .name {
      font-weight: 800;
      font-size: 17px;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .badge {
      font-size: 12px;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #0b1220;
      color: var(--text);
    }

    .skill-box {
      border-top: 1px solid var(--line);
      padding: 12px 14px;
    }

    .skill-title {
      font-size: 12px;
      color: var(--accent-2);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .skill-name {
      font-weight: 700;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .skill-text {
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .tag {
      border-radius: 999px;
      background: #172033;
      border: 1px solid #30425f;
      color: #dbeafe;
      padding: 4px 8px;
      font-size: 12px;
    }

    .links {
      display: flex;
      gap: 8px;
      padding: 0 14px 14px;
      margin-top: auto;
    }

    .links a {
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      background: #0b1220;
    }

    .links a:hover { border-color: var(--accent); }

    .status {
      padding: 16px;
      text-align: center;
      color: var(--muted);
    }

    .status.error { color: #fecaca; }

    @media (max-width: 980px) {
      .toolbar { grid-template-columns: 1fr 1fr; }
      .filter-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .toolbar { grid-template-columns: 1fr; }
      .card-main { grid-template-columns: 1fr; }
      .thumb { width: 100%; height: 180px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>문호 스트레이독스 미궁괴담 카드 필터</h1>
        <div class="sub">시트에서 수정한 태그를 바로 반영하도록 Apps Script JSON URL을 읽는 버전입니다.</div>
      </div>
    </div>

    <div class="panel">
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="카드명 / 스킬명 / 스킬 설명 검색" />
        <select id="sortSelect">
          <option value="idAsc">번호 오름차순</option>
          <option value="idDesc">번호 내림차순</option>
          <option value="nameAsc">이름 오름차순</option>
          <option value="rarityDesc">등급 높은순</option>
        </select>
        <select id="tagModeSelect">
          <option value="final">최종 태그 사용</option>
          <option value="auto">자동 태그 사용</option>
        </select>
        <button id="resetBtn" type="button">필터 초기화</button>
      </div>

      <div class="filter-grid" id="filterGrid"></div>

      <div class="summary">
        <div id="countText">불러오는 중...</div>
        <div id="sourceText"></div>
      </div>

      <div id="statusBox" class="status">데이터를 불러오는 중입니다.</div>
      <div id="cards" class="cards" hidden></div>
    </div>
  </div>

  <script>
    const CONFIG = {
      // Apps Script 웹앱 URL로 바꿔주세요.
      DATA_URL: 'https://script.google.com/macros/s/AKfycbxPpuYARh1SiYHabkrreHGtgAougkpiNfugn7m_Fo04TLrx3k_BB5yJWyh9aXx84yjtnQ/exec'
    };

    const FILTERS = [
      { key: 'rarity_group', label: '등급', options: ['R', 'SR', 'SSR', 'UR', 'EX'] },
      { key: 'type', label: '카드 타입', options: ['공격형', '지원형', '밸런스형', '특수형', '방어형'] },
      { key: 'attribute', label: '속성 타입', options: ['적속성', '청속성', '녹속성', '광속성', '암속성'] },
      { key: 'affiliation', label: '소속', options: ['무장 탐정사', '포트 마피아', '연합', '이능특무과', '미믹', '죽음의 집의 쥐', '무소속'] },
      { key: 'leader', label: '리더 스킬', options: ['팀원 전체 공증', '소속별 공증', '속성별 공증', '타입별 공증'] },
      { key: 'active', label: '액티브 스킬', options: ['단일 공격', '전체 공격', '전체 공증 버프', '속성별 공증 버프'] }
    ];

    const rarityRank = { EX: 5, UR: 4, SSR: 3, SR: 2, R: 1 };

    const state = {
      cards: [],
      selected: {
        rarity_group: new Set(),
        type: new Set(),
        attribute: new Set(),
        affiliation: new Set(),
        leader: new Set(),
        active: new Set(),
      }
    };

    const els = {
      filterGrid: document.getElementById('filterGrid'),
      cards: document.getElementById('cards'),
      statusBox: document.getElementById('statusBox'),
      countText: document.getElementById('countText'),
      sourceText: document.getElementById('sourceText'),
      searchInput: document.getElementById('searchInput'),
      sortSelect: document.getElementById('sortSelect'),
      tagModeSelect: document.getElementById('tagModeSelect'),
      resetBtn: document.getElementById('resetBtn')
    };

    init();

    async function init() {
      buildFilterUi();
      bindEvents();
      await loadCards();
    }

    function buildFilterUi() {
      els.filterGrid.innerHTML = '';
      for (const group of FILTERS) {
        const wrapper = document.createElement('div');
        wrapper.className = 'filter-group';

        const title = document.createElement('div');
        title.className = 'filter-title';
        title.textContent = `${group.label} (같은 그룹은 OR)`;

        const chips = document.createElement('div');
        chips.className = 'chips';

        for (const option of group.options) {
          const chip = document.createElement('button');
          chip.type = 'button';
          chip.className = 'chip';
          chip.textContent = option;
          chip.dataset.group = group.key;
          chip.dataset.value = option;
          chips.appendChild(chip);
        }

        wrapper.append(title, chips);
        els.filterGrid.appendChild(wrapper);
      }
    }

    function bindEvents() {
      els.filterGrid.addEventListener('click', (e) => {
        const chip = e.target.closest('.chip');
        if (!chip) return;

        const group = chip.dataset.group;
        const value = chip.dataset.value;
        const set = state.selected[group];

        if (set.has(value)) {
          set.delete(value);
          chip.classList.remove('active');
        } else {
          set.add(value);
          chip.classList.add('active');
        }

        render();
      });

      els.searchInput.addEventListener('input', render);
      els.sortSelect.addEventListener('change', render);
      els.tagModeSelect.addEventListener('change', render);
      els.resetBtn.addEventListener('click', () => {
        els.searchInput.value = '';
        els.sortSelect.value = 'idAsc';
        els.tagModeSelect.value = 'final';
        for (const key of Object.keys(state.selected)) {
          state.selected[key].clear();
        }
        document.querySelectorAll('.chip.active').forEach(chip => chip.classList.remove('active'));
        render();
      });
    }

    async function loadCards() {
      try {
        showStatus('데이터를 불러오는 중입니다.');
        const res = await fetch(CONFIG.DATA_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error('응답 JSON이 배열이 아닙니다.');

        state.cards = data.map(normalizeCard);
        els.sourceText.textContent = '데이터 소스: Google Sheets + Apps Script';
        render();
      } catch (err) {
        console.error(err);
        showStatus(`데이터를 불러오지 못했습니다. ${err.message}`, true);
      }
    }

    function normalizeCard(card) {
      const leaderFinal = splitTagField(card.leader_tags_final || card.leader_tags_final_text);
      const activeFinal = splitTagField(card.active_tags_final || card.active_tags_final_text);
      const leaderAuto = splitTagField(card.leader_tags_auto || card.leader_tags_auto_text);
      const activeAuto = splitTagField(card.active_tags_auto || card.active_tags_auto_text);

      return {
        ...card,
        idNum: Number(String(card.id || card.no_jp || '0').replace(/\D/g, '')) || 0,
        display_name_jp: String(card.display_name_jp || card.name_jp || card.character_name_jp || card.character_name_en || card.id || 'Unknown').trim(),
        leaderTagsFinal: leaderFinal,
        activeTagsFinal: activeFinal,
        leaderTagsAuto: leaderAuto,
        activeTagsAuto: activeAuto,
      };
    }

    function splitTagField(value) {
      if (Array.isArray(value)) return value.map(v => String(v).trim()).filter(Boolean);
      return String(value || '')
        .split('|')
        .map(v => v.trim())
        .filter(Boolean);
    }

    function getLeaderTags(card) {
      return els.tagModeSelect.value === 'final' ? card.leaderTagsFinal : card.leaderTagsAuto;
    }

    function getActiveTags(card) {
      return els.tagModeSelect.value === 'final' ? card.activeTagsFinal : card.activeTagsAuto;
    }

    function render() {
      const keyword = els.searchInput.value.trim().toLowerCase();
      const filtered = state.cards.filter(card => {
        const leaderTags = getLeaderTags(card);
        const activeTags = getActiveTags(card);

        if (keyword) {
          const haystack = [
            card.display_name_jp,
            card.character_name_jp,
            card.character_name_en,
            card.title_jp,
            card.leader_skill_name,
            card.leader_skill_raw,
            card.active_skill_name,
            card.active_skill_raw
          ].join(' ').toLowerCase();
          if (!haystack.includes(keyword)) return false;
        }

        if (!matchesOrWithinGroup(card.rarity_group, state.selected.rarity_group)) return false;
        if (!matchesOrWithinGroup(card.type, state.selected.type)) return false;
        if (!matchesOrWithinGroup(card.attribute, state.selected.attribute)) return false;
        if (!matchesOrWithinGroup(card.affiliation, state.selected.affiliation)) return false;
        if (!matchesTagGroup(leaderTags, state.selected.leader)) return false;
        if (!matchesTagGroup(activeTags, state.selected.active)) return false;

        return true;
      });

      sortCards(filtered);
      drawCards(filtered);
      els.countText.textContent = `표시 카드: ${filtered.length} / 전체 ${state.cards.length}`;
    }

    function matchesOrWithinGroup(value, selectedSet) {
      if (selectedSet.size === 0) return true;
      return selectedSet.has(String(value || '').trim());
    }

    function matchesTagGroup(tags, selectedSet) {
      if (selectedSet.size === 0) return true;
      return tags.some(tag => selectedSet.has(tag));
    }

    function sortCards(cards) {
      const mode = els.sortSelect.value;
      cards.sort((a, b) => {
        if (mode === 'idDesc') return b.idNum - a.idNum;
        if (mode === 'nameAsc') return a.display_name_jp.localeCompare(b.display_name_jp, 'ja');
        if (mode === 'rarityDesc') {
          const diff = (rarityRank[b.rarity_group] || 0) - (rarityRank[a.rarity_group] || 0);
          return diff || a.idNum - b.idNum;
        }
        return a.idNum - b.idNum;
      });
    }

    function drawCards(cards) {
      els.cards.innerHTML = '';

      if (cards.length === 0) {
        els.cards.hidden = true;
        showStatus('조건에 맞는 카드가 없습니다.');
        return;
      }

      els.cards.hidden = false;
      els.statusBox.hidden = true;

      for (const card of cards) {
        const leaderTags = getLeaderTags(card);
        const activeTags = getActiveTags(card);

        const article = document.createElement('article');
        article.className = 'card';

        article.innerHTML = `
          <div class="card-main">
            <div class="thumb">
              ${card.thumb_url ? `<img src="${escapeHtml(card.thumb_url)}" alt="${escapeHtml(card.display_name_jp)}" loading="lazy">` : `<div class="thumb-empty">이미지 없음</div>`}
            </div>
            <div>
              <div class="name">${escapeHtml(card.display_name_jp)}</div>
              <div class="meta">
                ${badge(card.no_jp || card.id)}
                ${badge(card.rarity_group || card.rarity)}
                ${badge(card.attribute)}
                ${badge(card.type)}
                ${badge(card.affiliation)}
              </div>
            </div>
          </div>

          <div class="skill-box">
            <div class="skill-title">리더 스킬</div>
            <div class="skill-name">${escapeHtml(card.leader_skill_name || '-')}</div>
            <div class="skill-text">${escapeHtml(card.leader_skill_raw || '-')}</div>
            <div class="tag-row">${leaderTags.map(tagPill).join('')}</div>
          </div>

          <div class="skill-box">
            <div class="skill-title">액티브 스킬</div>
            <div class="skill-name">${escapeHtml(card.active_skill_name || '-')}</div>
            <div class="skill-text">${escapeHtml(card.active_skill_raw || '-')}</div>
            <div class="tag-row">${activeTags.map(tagPill).join('')}</div>
          </div>

          <div class="links">
            ${card.fandom_url ? `<a href="${escapeHtml(card.fandom_url)}" target="_blank" rel="noopener noreferrer">Fandom</a>` : ''}
            ${card.gamerch_url ? `<a href="${escapeHtml(card.gamerch_url)}" target="_blank" rel="noopener noreferrer">Gamerch</a>` : ''}
          </div>
        `;

        els.cards.appendChild(article);
      }
    }

    function badge(text) {
      const value = String(text || '').trim();
      return value ? `<span class="badge">${escapeHtml(value)}</span>` : '';
    }

    function tagPill(text) {
      return `<span class="tag">${escapeHtml(text)}</span>`;
    }

    function showStatus(text, isError = false) {
      els.cards.hidden = true;
      els.statusBox.hidden = false;
      els.statusBox.className = `status${isError ? ' error' : ''}`;
      els.statusBox.textContent = text;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }
  </script>
</body>
</html>
