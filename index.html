<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문호 스트레이독스 미궁괴담 카드 필터</title>
  <style>
    :root {
      --bg: #111318;
      --panel: #1a1f29;
      --panel-2: #232a36;
      --border: #364154;
      --text: #f3f6fb;
      --muted: #aeb7c6;
      --accent: #6ea8ff;
      --accent-2: #8fd3ff;
      --danger: #ff8a8a;
      --tag-bg: #2e3a4d;
      --tag-on: #4d79c7;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans KR", "Malgun Gothic", sans-serif;
    }

    .wrap {
      max-width: 1500px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.2;
    }

    .desc {
      color: var(--muted);
      margin-bottom: 18px;
      line-height: 1.6;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .grid-ctrl {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .ctrl {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ctrl label {
      font-size: 13px;
      color: var(--muted);
    }

    .ctrl input,
    .ctrl select {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .chip {
      border: 1px solid var(--border);
      background: var(--tag-bg);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      user-select: none;
    }

    .chip.active {
      background: var(--tag-on);
      border-color: var(--tag-on);
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn:hover {
      filter: brightness(1.08);
    }

    .status {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    .count {
      color: var(--accent-2);
      font-weight: 700;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      background: linear-gradient(180deg, #1a1f29 0%, #151a22 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .thumb-wrap {
      height: 180px;
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .thumb-fallback {
      color: var(--muted);
      font-size: 13px;
    }

    .card-body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .title-line {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      justify-content: space-between;
    }

    .card-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #263042;
      font-size: 12px;
    }

    .section-title {
      font-size: 13px;
      color: var(--accent-2);
      margin-bottom: 4px;
      font-weight: 700;
    }

    .skill-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 10px;
    }

    .skill-text {
      white-space: pre-wrap;
      line-height: 1.55;
      font-size: 14px;
      color: #e7edf8;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .mini-tag {
      font-size: 12px;
      padding: 4px 8px;
      background: #314158;
      border-radius: 999px;
      color: #dce9ff;
      border: 1px solid #40536e;
    }

    .empty {
      padding: 40px 16px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,0.02);
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 1000px) {
      .grid-ctrl {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .grid-ctrl {
        grid-template-columns: 1fr;
      }

      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>문호 스트레이독스 미궁괴담 카드 필터</h1>
    <div class="desc">
      Google Sheets 기반으로 직접 데이터를 읽어와 표시합니다.
      이제 <code>cards.json</code> 대신 스프레드 시트만 수정하면 사이트 내용이 반영되도록 구성한 버전입니다.
    </div>

    <div class="panel">
      <div class="grid-ctrl">
        <div class="ctrl">
          <label for="searchInput">이름 / 스킬 / 태그 검색</label>
          <input id="searchInput" type="text" placeholder="카드명, 스킬 내용, 태그 검색" />
        </div>

        <div class="ctrl">
          <label for="groupSelect">소속</label>
          <select id="groupSelect">
            <option value="">전체</option>
          </select>
        </div>

        <div class="ctrl">
          <label for="attributeSelect">속성</label>
          <select id="attributeSelect">
            <option value="">전체</option>
          </select>
        </div>

        <div class="ctrl">
          <label for="sortSelect">정렬</label>
          <select id="sortSelect">
            <option value="id_asc">카드 ID 오름차순</option>
            <option value="id_desc">카드 ID 내림차순</option>
            <option value="name_asc">이름 오름차순</option>
            <option value="name_desc">이름 내림차순</option>
          </select>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="ctrl">
        <label>등급 태그 (OR)</label>
        <div class="chips" id="rarityChips"></div>
      </div>

      <div class="ctrl" style="margin-top: 14px;">
        <label>리더 스킬 태그 (OR)</label>
        <div class="chips" id="leaderTagChips"></div>
      </div>

      <div class="ctrl" style="margin-top: 14px;">
        <label>액티브 스킬 태그 (OR)</label>
        <div class="chips" id="activeTagChips"></div>
      </div>

      <div class="row" style="margin-top: 14px;">
        <button class="btn" id="clearLeaderBtn">리더 태그 초기화</button>
        <button class="btn" id="clearActiveBtn">액티브 태그 초기화</button>
        <button class="btn" id="clearRarityBtn">등급 태그 초기화</button>
        <button class="btn" id="clearAllBtn">전체 필터 초기화</button>
      </div>
    </div>

    <div class="panel">
      <div class="status">
        <span>전체 카드: <span class="count" id="totalCount">0</span></span>
        <span>표시 카드: <span class="count" id="visibleCount">0</span></span>
        <span id="loadStatus">불러오는 중...</span>
      </div>
    </div>

    <div id="cardsContainer" class="cards"></div>

    <div class="footer-note">
      시트의 1행을 헤더로 읽습니다. 태그 컬럼은 쉼표(<code>,</code>), 세미콜론(<code>;</code>), 슬래시(<code>/</code>), 줄바꿈 기준으로 분리합니다.
    </div>
  </div>

  <script>
    // =========================
    // 설정
    // =========================
    const SHEET_ID = "1g9ILj7xcwK_ij7yWQnUZfO-KWkldswjEoVE-vUtK0Ns";
    const SHEET_GID = "196752116";

    // 공개 시트일 때 가장 다루기 편한 방식
    const SHEET_GVIZ_URL =
      `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${SHEET_GID}&tqx=out:json`;

    const state = {
      allCards: [],
      filteredCards: [],
      selectedRarities: new Set(),
      selectedLeaderTags: new Set(),
      selectedActiveTags: new Set(),
    };

    const el = {
      searchInput: document.getElementById("searchInput"),
      groupSelect: document.getElementById("groupSelect"),
      attributeSelect: document.getElementById("attributeSelect"),
      sortSelect: document.getElementById("sortSelect"),
      rarityChips: document.getElementById("rarityChips"),
      leaderTagChips: document.getElementById("leaderTagChips"),
      activeTagChips: document.getElementById("activeTagChips"),
      clearLeaderBtn: document.getElementById("clearLeaderBtn"),
      clearActiveBtn: document.getElementById("clearActiveBtn"),
      clearRarityBtn: document.getElementById("clearRarityBtn"),
      clearAllBtn: document.getElementById("clearAllBtn"),
      totalCount: document.getElementById("totalCount"),
      visibleCount: document.getElementById("visibleCount"),
      loadStatus: document.getElementById("loadStatus"),
      cardsContainer: document.getElementById("cardsContainer"),
    };

    // =========================
    // 공용 유틸
    // =========================
    function norm(v) {
      return (v ?? "").toString().trim();
    }

    function numOrInfinity(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : Number.MAX_SAFE_INTEGER;
    }

    function uniqueSorted(values) {
      return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b, "ja"));
    }

    function splitTags(text) {
      return uniqueSorted(
        norm(text)
          .split(/[\n,;/|]+/g)
          .map(v => v.trim())
          .filter(Boolean)
      );
    }

    function textIncludesAny(haystack, needles) {
      if (!needles || needles.length === 0) return true;
      const h = norm(haystack).toLowerCase();
      return needles.some(n => h.includes(norm(n).toLowerCase()));
    }

    function tagMatchOr(selectedSet, cardTags) {
      if (selectedSet.size === 0) return true;
      return [...selectedSet].some(tag => cardTags.includes(tag));
    }

    function escapeHtml(str) {
      return norm(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function pickThumb(card) {
      return norm(card.thumb_url) || norm(card.thumbnail);
    }

    // =========================
    // Google Sheets 로드
    // =========================
    async function fetchSheetRows() {
      const res = await fetch(SHEET_GVIZ_URL);
      if (!res.ok) {
        throw new Error(`시트 요청 실패: ${res.status}`);
      }

      const raw = await res.text();

      // google.visualization.Query.setResponse(...)
      const jsonText = raw
        .replace(/^.*?setResponse\(/s, "")
        .replace(/\);\s*$/s, "");

      const data = JSON.parse(jsonText);
      const table = data.table;

      const headers = table.cols.map(col => norm(col.label || col.id));
      const rows = table.rows.map(row => {
        const obj = {};
        headers.forEach((header, idx) => {
          const cell = row.c[idx];
          obj[header] = cell ? (cell.f ?? cell.v ?? "") : "";
        });
        return obj;
      });

      return rows;
    }

    function normalizeCard(row) {
      const leaderTags = splitTags(row.leader_tags_final || row.leader_tags_auto);
      const activeTags = splitTags(row.active_tags_final || row.active_tags_auto);

      return {
        ...row,
        id: norm(row.id),
        name_jp: norm(row.name_jp),
        thumb_url: norm(row.thumb_url),
        thumbnail: norm(row.thumbnail),
        rarity: norm(row.rarity),
        attribute: norm(row.attribute),
        group: norm(row.group),
        leader_skill_raw: norm(row.leader_skill_raw),
        active_skill_raw: norm(row.active_skill_raw),
        leader_tags: leaderTags,
        active_tags: activeTags,
      };
    }

    // =========================
    // UI 생성
    // =========================
    function buildSelectOptions() {
      const groups = uniqueSorted(state.allCards.map(c => c.group));
      const attributes = uniqueSorted(state.allCards.map(c => c.attribute));
      const rarities = uniqueSorted(state.allCards.map(c => c.rarity));
      const leaderTags = uniqueSorted(state.allCards.flatMap(c => c.leader_tags));
      const activeTags = uniqueSorted(state.allCards.flatMap(c => c.active_tags));

      el.groupSelect.innerHTML =
        `<option value="">전체</option>` +
        groups.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");

      el.attributeSelect.innerHTML =
        `<option value="">전체</option>` +
        attributes.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");

      renderTagChips(el.rarityChips, rarities, state.selectedRarities);
      renderTagChips(el.leaderTagChips, leaderTags, state.selectedLeaderTags);
      renderTagChips(el.activeTagChips, activeTags, state.selectedActiveTags);
    }

    function renderTagChips(container, values, selectedSet) {
      container.innerHTML = values.map(v => {
        const active = selectedSet.has(v) ? "active" : "";
        return `<button class="chip ${active}" type="button" data-tag="${escapeHtml(v)}">${escapeHtml(v)}</button>`;
      }).join("");

      [...container.querySelectorAll(".chip")].forEach(btn => {
        btn.addEventListener("click", () => {
          const tag = btn.dataset.tag;
          if (selectedSet.has(tag)) {
            selectedSet.delete(tag);
          } else {
            selectedSet.add(tag);
          }
          applyFilters();
          buildSelectOptions();
        });
      });
    }

    // =========================
    // 필터 / 정렬
    // =========================
    function applyFilters() {
      const keyword = norm(el.searchInput.value).toLowerCase();
      const group = norm(el.groupSelect.value);
      const attribute = norm(el.attributeSelect.value);
      const sort = norm(el.sortSelect.value);

      const filtered = state.allCards.filter(card => {
        if (group && card.group !== group) return false;
        if (attribute && card.attribute !== attribute) return false;

        if (state.selectedRarities.size > 0 && !state.selectedRarities.has(card.rarity)) {
          return false;
        }

        if (!tagMatchOr(state.selectedLeaderTags, card.leader_tags)) {
          return false;
        }

        if (!tagMatchOr(state.selectedActiveTags, card.active_tags)) {
          return false;
        }

        if (keyword) {
          const searchable = [
            card.id,
            card.name_jp,
            card.rarity,
            card.attribute,
            card.group,
            card.leader_skill_raw,
            card.active_skill_raw,
            card.leader_tags.join(" "),
            card.active_tags.join(" "),
          ].join(" ").toLowerCase();

          if (!searchable.includes(keyword)) {
            return false;
          }
        }

        return true;
      });

      filtered.sort((a, b) => {
        switch (sort) {
          case "id_desc":
            return numOrInfinity(b.id) - numOrInfinity(a.id);
          case "name_asc":
            return a.name_jp.localeCompare(b.name_jp, "ja");
          case "name_desc":
            return b.name_jp.localeCompare(a.name_jp, "ja");
          case "id_asc":
          default:
            return numOrInfinity(a.id) - numOrInfinity(b.id);
        }
      });

      state.filteredCards = filtered;
      renderCards();
      el.totalCount.textContent = String(state.allCards.length);
      el.visibleCount.textContent = String(state.filteredCards.length);
    }

    // =========================
    // 카드 렌더링
    // =========================
    function renderCards() {
      if (state.filteredCards.length === 0) {
        el.cardsContainer.innerHTML = `
          <div class="empty" style="grid-column: 1 / -1;">
            조건에 맞는 카드가 없습니다.
          </div>
        `;
        return;
      }

      el.cardsContainer.innerHTML = state.filteredCards.map(card => {
        const thumb = pickThumb(card);

        return `
          <article class="card">
            <div class="thumb-wrap">
              ${
                thumb
                  ? `<img src="${escapeHtml(thumb)}" alt="${escapeHtml(card.name_jp)}" loading="lazy" referrerpolicy="no-referrer" />`
                  : `<div class="thumb-fallback">이미지 없음</div>`
              }
            </div>
            <div class="card-body">
              <div class="title-line">
                <h2 class="card-title">${escapeHtml(card.name_jp || "(이름 없음)")}</h2>
              </div>

              <div class="meta">
                ${card.id ? `<span class="pill">ID ${escapeHtml(card.id)}</span>` : ""}
                ${card.rarity ? `<span class="pill">등급 ${escapeHtml(card.rarity)}</span>` : ""}
                ${card.attribute ? `<span class="pill">속성 ${escapeHtml(card.attribute)}</span>` : ""}
                ${card.group ? `<span class="pill">소속 ${escapeHtml(card.group)}</span>` : ""}
              </div>

              <div class="skill-box">
                <div class="section-title">리더 스킬</div>
                <div class="skill-text">${escapeHtml(card.leader_skill_raw || "-")}</div>
              </div>

              <div class="tag-list">
                ${card.leader_tags.map(tag => `<span class="mini-tag">${escapeHtml(tag)}</span>`).join("")}
              </div>

              <div class="skill-box">
                <div class="section-title">액티브 스킬</div>
                <div class="skill-text">${escapeHtml(card.active_skill_raw || "-")}</div>
              </div>

              <div class="tag-list">
                ${card.active_tags.map(tag => `<span class="mini-tag">${escapeHtml(tag)}</span>`).join("")}
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    // =========================
    // 이벤트
    // =========================
    function bindEvents() {
      el.searchInput.addEventListener("input", applyFilters);
      el.groupSelect.addEventListener("change", applyFilters);
      el.attributeSelect.addEventListener("change", applyFilters);
      el.sortSelect.addEventListener("change", applyFilters);

      el.clearLeaderBtn.addEventListener("click", () => {
        state.selectedLeaderTags.clear();
        buildSelectOptions();
        applyFilters();
      });

      el.clearActiveBtn.addEventListener("click", () => {
        state.selectedActiveTags.clear();
        buildSelectOptions();
        applyFilters();
      });

      el.clearRarityBtn.addEventListener("click", () => {
        state.selectedRarities.clear();
        buildSelectOptions();
        applyFilters();
      });

      el.clearAllBtn.addEventListener("click", () => {
        state.selectedLeaderTags.clear();
        state.selectedActiveTags.clear();
        state.selectedRarities.clear();
        el.searchInput.value = "";
        el.groupSelect.value = "";
        el.attributeSelect.value = "";
        el.sortSelect.value = "id_asc";
        buildSelectOptions();
        applyFilters();
      });
    }

    // =========================
    // 시작
    // =========================
    async function init() {
      try {
        el.loadStatus.textContent = "시트에서 데이터 불러오는 중...";
        bindEvents();

        const rows = await fetchSheetRows();
        state.allCards = rows
          .filter(row => Object.values(row).some(v => norm(v) !== ""))
          .map(normalizeCard);

        buildSelectOptions();
        applyFilters();

        el.loadStatus.textContent = "불러오기 완료";
      } catch (err) {
        console.error(err);
        el.loadStatus.textContent = "불러오기 실패";
        el.cardsContainer.innerHTML = `
          <div class="empty" style="grid-column: 1 / -1;">
            Google Sheets 데이터를 불러오지 못했습니다.<br />
            시트가 '링크가 있는 모든 사용자에게 공개' 상태인지, 그리고 gid가 맞는지 확인해 주세요.
          </div>
        `;
      }
    }

    init();
  </script>
</body>
</html>
