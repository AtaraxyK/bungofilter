<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSD Mayoi Filter Strict Tags</title>
  <style>
    :root{
      --bg:#0f1115; --panel:#171a21; --line:#2b3340; --text:#e8ecf3; --muted:#aeb7c6;
      --chip:#273246; --chip-on:#3a69d8; --accent:#7aa2ff; --box:#131820;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:"Malgun Gothic","Apple SD Gothic Neo",sans-serif}
    .wrap{max-width:1500px;margin:0 auto;padding:20px}
    h1{margin:0 0 8px;font-size:28px}
    .desc{color:var(--muted);line-height:1.55;margin-bottom:18px}
    .topbar{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:10px;margin-bottom:12px}
    input,select,button{font:inherit}
    input[type=text],select{
      width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--line);
      background:var(--panel);color:var(--text)
    }
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px}
    .section-title{font-size:14px;color:var(--muted);margin-bottom:10px}
    .chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip{border:1px solid var(--line);background:var(--chip);color:var(--text);padding:8px 11px;border-radius:999px;cursor:pointer}
    .chip.active{background:var(--chip-on);border-color:#5f8fff}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    button{border:1px solid var(--line);background:#1e232d;color:var(--text);padding:10px 12px;border-radius:10px;cursor:pointer}
    .summary{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:10px 0 16px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
    .card-top{display:grid;grid-template-columns:104px 1fr;gap:12px;padding:12px;border-bottom:1px solid var(--line)}
    .thumb{width:104px;height:104px;object-fit:cover;border-radius:12px;background:#0b0d11;border:1px solid var(--line)}
    .thumb-fallback{width:104px;height:104px;border-radius:12px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted);background:linear-gradient(135deg,#1d2430,#11151d)}
    .title{font-size:18px;line-height:1.3;margin:0 0 6px}
    .sub{color:var(--muted);font-size:13px;line-height:1.5;margin-bottom:8px}
    .meta{display:flex;flex-wrap:wrap;gap:6px}
    .badge{font-size:12px;padding:5px 8px;border-radius:999px;background:#222a35;border:1px solid var(--line)}
    .body{padding:12px;display:grid;gap:10px}
    .skill-box{background:var(--box);border:1px solid var(--line);border-radius:12px;padding:10px}
    .skill-label{font-size:12px;color:var(--accent);margin-bottom:8px;font-weight:700}
    .summary-line{font-size:13px;line-height:1.6;padding:6px 8px;border-radius:10px;background:#1b2330;margin-top:6px}
    .summary-tag{display:inline-block;min-width:78px;margin-right:8px;color:#9dc0ff;font-weight:700}
    .raw{margin-top:8px}
    .raw summary{cursor:pointer;color:var(--muted);font-size:12px}
    .raw pre{
      margin:8px 0 0;padding:8px;border-radius:10px;background:#0f141d;border:1px solid var(--line);
      white-space:pre-wrap;word-break:break-word;color:#cfd8e8;font-size:12px;line-height:1.45
    }
    .empty{padding:30px 20px;text-align:center;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:16px}
    .link{color:#9dc0ff;text-decoration:none;font-size:13px}
    .footer{padding:0 12px 12px}
    .note{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.45}
    @media (max-width:960px){
      .topbar{grid-template-columns:1fr}
      .card-top{grid-template-columns:88px 1fr}
      .thumb,.thumb-fallback{width:88px;height:88px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>문호 스트레이독스 미궁괴담 카드 필터</h1>
    <div class="desc">
      <strong>cards.json</strong> 기준으로 동작하며, 태그는 원문 스킬 텍스트를 다시 분석해서 계산합니다.
      속성 이름만 들어간 문구는 공증으로 처리하지 않고, <strong>실제 공격력 증가 문구</strong>가 있을 때만 속성 공증으로 잡습니다.
      리더/액티브/등급 태그는 모두 OR 방식입니다.
    </div>

    <div class="topbar">
      <input id="searchInput" type="text" placeholder="카드명 / 제목 / 요약 검색" />
      <select id="groupSelect"><option value="">소속 전체</option></select>
      <select id="attributeSelect"><option value="">속성 전체</option></select>
      <select id="sortSelect">
        <option value="id">정렬: 카드 ID</option>
        <option value="name">정렬: 이름</option>
      </select>
    </div>

    <div class="panel">
      <div class="section-title">등급 태그 (OR)</div>
      <div id="rarityTags" class="chips"></div>
    </div>

    <div class="panel">
      <div class="section-title">리더 스킬 태그 (OR)</div>
      <div id="leaderTags" class="chips"></div>
      <div class="actions"><button id="clearLeader">리더 태그 초기화</button></div>
    </div>

    <div class="panel">
      <div class="section-title">액티브 스킬 태그 (OR)</div>
      <div id="activeTags" class="chips"></div>
      <div class="actions">
        <button id="clearActive">액티브 태그 초기화</button>
        <button id="clearRarity">등급 태그 초기화</button>
        <button id="clearAll">전체 필터 초기화</button>
      </div>
      <div class="note">단일 대상 공격은 <strong>단일공격</strong>, 적 전체 대상은 <strong>전체공격</strong>으로 분리합니다.</div>
    </div>

    <div class="summary">
      <div id="resultCount">불러오는 중...</div>
      <div id="loadState"></div>
    </div>

    <div id="cardGrid" class="grid"></div>
  </div>

  <script>
    const state = {
      cards: [],
      selectedLeaderTags: new Set(),
      selectedActiveTags: new Set(),
      selectedRarityTags: new Set(),
      search: '',
      group: '',
      attribute: '',
      sort: 'id'
    };

    const leaderPreferredOrder = ['전체공증','무장탐정사공증','포트마피아공증','홍속공증','청속공증','녹속공증','광속공증','암속공증'];
    const activePreferredOrder = ['단일공격','전체공격','전체공증','홍속공증','청속공증','녹속공증','광속공증','암속공증'];
    const rarityOrder = ['R','SR','SSR','UR','EX'];

    const rarityContainer = document.getElementById('rarityTags');
    const leaderContainer = document.getElementById('leaderTags');
    const activeContainer = document.getElementById('activeTags');
    const searchInput = document.getElementById('searchInput');
    const groupSelect = document.getElementById('groupSelect');
    const attributeSelect = document.getElementById('attributeSelect');
    const sortSelect = document.getElementById('sortSelect');
    const resultCount = document.getElementById('resultCount');
    const loadState = document.getElementById('loadState');
    const cardGrid = document.getElementById('cardGrid');

    function uniq(arr){ return [...new Set(arr.filter(Boolean))]; }
    function escapeHtml(v){
      return String(v ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }
    function tagSort(tags, preferred){
      const rest = tags.filter(t => !preferred.includes(t)).sort((a,b)=>a.localeCompare(b,'ko'));
      return [...preferred.filter(t => tags.includes(t)), ...rest];
    }
    function localizeGroup(v){
      const map = {
        'Armed Detective Agency':'무장탐정사',
        'Port Mafia':'포트 마피아',
        'Guild':'길드',
        'Decay of the Angel':'천인오쇠',
        'Rats in the House of the Dead':'쥐의 집',
        'Independent':'무소속',
        'Mimic':'미믹',
        'Supernatural Ability Special Investigation Division':'이능특무과',
        'Order of the Clock Tower':'시계탑'
      };
      return map[v] || v || '';
    }
    function localizeAttribute(v){
      const map = {'Crimson':'홍','Azure':'청','Emerald':'녹','Light':'광','Dark':'암'};
      return map[v] || v || '';
    }
    function inferRarityInfo(card){
      const hay = [card.rarity, card.title, card.title_jp, card.name, card.wiki_url].join(' ');
      const m = hay.match(/\b(EX|SSR|SR|UR|R)(\+)?\b/i);
      if (!m) return {base:'', display:''};
      return {base:m[1].toUpperCase(), display:(m[1].toUpperCase() + (m[2] ? '+' : ''))};
    }
    function padId(v){
      const s = String(v ?? '');
      return /^\d+$/.test(s) ? s.padStart(4, '0') : s;
    }

    function textHasAttackUpMeaning(text){
      const t = String(text || '');
      return /(ATK|attack power|attack|攻撃力|공격력)/i.test(t) && /(up|increase|increases|boost|アップ|증가)/i.test(t);
    }
    function textHasTeamAllMeaning(text){
      return /(all team|all members|team members|all allies|チーム全員)/i.test(String(text || ''));
    }
    function textHasSingleTargetMeaning(text){
      return /(single enemy|one enemy|enemy only|to 1 enemy|to one enemy|敵単体)/i.test(String(text || ''));
    }
    function textHasAllTargetMeaning(text){
      return /(all enemies|enemy team|to all enemies|敵全体)/i.test(String(text || ''));
    }
    function textHasDamageMeaning(text){
      return /(damage|damages|attack|攻撃|ダメージ)/i.test(String(text || ''));
    }
    function detectAttrAttackTag(text){
      const t = String(text || '');
      if (!textHasAttackUpMeaning(t)) return '';
      if (/Emerald|翠属性|緑属性|Green/i.test(t)) return '녹속공증';
      if (/Azure|蒼属性|青属性|Blue/i.test(t)) return '청속공증';
      if (/Crimson|紅属性|Red/i.test(t)) return '홍속공증';
      if (/Light|光属性/i.test(t)) return '광속공증';
      if (/Dark|闇属性|暗属性/i.test(t)) return '암속공증';
      return '';
    }
    function detectPercent(text){
      const m = String(text || '').match(/(\d+)\s*%/);
      return m ? m[1] : '';
    }
    function detectTurns(text){
      const m = String(text || '').match(/(\d+)\s*turns?/i) || String(text || '').match(/(\d+)\s*ターン/);
      return m ? m[1] : '';
    }
    function detectMultiplier(text){
      const m = String(text || '').match(/ATK\s*[x×]\s*([0-9.]+)/i)
        || String(text || '').match(/attack power\s*[x×]\s*([0-9.]+)/i)
        || String(text || '').match(/공격력\s*[x×]\s*([0-9.]+)/i)
        || String(text || '').match(/攻撃力\s*[x×]\s*([0-9.]+)/i);
      return m ? m[1] : '';
    }

    function computeLeaderTags(card){
      const t = String(card.leader_skill_text || '');
      const tags = [];
      if (textHasTeamAllMeaning(t) && textHasAttackUpMeaning(t)) tags.push('전체공증');
      if (/(Armed Detective Agency|武装探偵社)/i.test(t) && textHasAttackUpMeaning(t)) tags.push('무장탐정사공증');
      if (/(Port Mafia|ポートマフィア)/i.test(t) && textHasAttackUpMeaning(t)) tags.push('포트마피아공증');
      const attrTag = detectAttrAttackTag(t);
      if (attrTag) tags.push(attrTag);
      return uniq(tags);
    }

    function computeActiveTags(card){
      const t = String(card.active_skill_text || '');
      const tags = [];
      if (textHasSingleTargetMeaning(t) && textHasDamageMeaning(t)) tags.push('단일공격');
      if (textHasAllTargetMeaning(t) && textHasDamageMeaning(t)) tags.push('전체공격');
      if (textHasTeamAllMeaning(t) && textHasAttackUpMeaning(t)) tags.push('전체공증');
      const attrTag = detectAttrAttackTag(t);
      if (attrTag) tags.push(attrTag);
      return uniq(tags);
    }

    function normalizeCards(rawCards){
      return rawCards.map(card => {
        const rarity = inferRarityInfo(card);
        const leader_tags_calc = computeLeaderTags(card);
        const active_tags_calc = computeActiveTags(card);
        return {
          ...card,
          rarity_base: rarity.base,
          rarity_display: rarity.display || rarity.base,
          display_group: localizeGroup(card.group),
          display_attribute: localizeAttribute(card.attribute),
          display_title: card.title_jp || card.title || card.name || '(이름 없음)',
          display_subname: card.title_jp ? (card.name || '') : '',
          display_id: padId(card.id),
          leader_tags_calc,
          active_tags_calc
        };
      });
    }

    function dedupeLinePairs(lines){
      const out = [];
      const seen = new Set();
      for (const item of lines){
        const key = item.join('|');
        if (!seen.has(key)){
          seen.add(key);
          out.push(item);
        }
      }
      return out;
    }

    function leaderSummaryLines(card){
      const tags = card.leader_tags_calc || [];
      const chosen = state.selectedLeaderTags.size ? tags.filter(t => state.selectedLeaderTags.has(t)) : tags;
      const text = String(card.leader_skill_text || '');
      const pct = detectPercent(text);
      const lines = [];
      for (const tag of chosen){
        if (tag === '전체공증') lines.push([tag, `팀 전체 공격력 ${pct || '?'}% 증가`]);
        else if (tag === '무장탐정사공증') lines.push([tag, `무장탐정사 공격력 ${pct || '?'}% 증가`]);
        else if (tag === '포트마피아공증') lines.push([tag, `포트 마피아 공격력 ${pct || '?'}% 증가`]);
        else if (tag.endsWith('속공증')) lines.push([tag, `${tag.replace('공증','')} 공격력 ${pct || '?'}% 증가`]);
      }
      return dedupeLinePairs(lines);
    }

    function activeSummaryLines(card){
      const tags = card.active_tags_calc || [];
      const chosen = state.selectedActiveTags.size ? tags.filter(t => state.selectedActiveTags.has(t)) : tags;
      const text = String(card.active_skill_text || '');
      const pct = detectPercent(text);
      const turns = detectTurns(text);
      const mul = detectMultiplier(text);
      const lines = [];
      for (const tag of chosen){
        if (tag === '단일공격') lines.push([tag, `적 1명에게 공격력 ${mul || '?'}배 대미지`]);
        else if (tag === '전체공격') lines.push([tag, `적 전체에게 공격력 ${mul || '?'}배 대미지`]);
        else if (tag === '전체공증') lines.push([tag, `팀 전체 공격력 ${pct || '?'}% 증가${turns ? ` (${turns}턴)` : ''}`]);
        else if (tag.endsWith('속공증')) lines.push([tag, `${tag.replace('공증','')} 공격력 ${pct || '?'}% 증가${turns ? ` (${turns}턴)` : ''}`]);
      }
      return dedupeLinePairs(lines);
    }

    function makeChip(tag, activeSet, onToggle){
      const btn = document.createElement('button');
      btn.className = 'chip' + (activeSet.has(tag) ? ' active' : '');
      btn.textContent = tag;
      btn.onclick = () => onToggle(tag);
      return btn;
    }

    function buildTagAreas(){
      const rarityTags = rarityOrder.filter(r => state.cards.some(c => c.rarity_base === r));
      const leaderTags = tagSort(uniq(state.cards.flatMap(c => c.leader_tags_calc || [])), leaderPreferredOrder);
      const activeTags = tagSort(uniq(state.cards.flatMap(c => c.active_tags_calc || [])), activePreferredOrder);

      rarityContainer.innerHTML = '';
      leaderContainer.innerHTML = '';
      activeContainer.innerHTML = '';

      for (const tag of rarityTags){
        rarityContainer.appendChild(makeChip(tag, state.selectedRarityTags, (t) => {
          state.selectedRarityTags.has(t) ? state.selectedRarityTags.delete(t) : state.selectedRarityTags.add(t);
          buildTagAreas(); render();
        }));
      }
      for (const tag of leaderTags){
        leaderContainer.appendChild(makeChip(tag, state.selectedLeaderTags, (t) => {
          state.selectedLeaderTags.has(t) ? state.selectedLeaderTags.delete(t) : state.selectedLeaderTags.add(t);
          buildTagAreas(); render();
        }));
      }
      for (const tag of activeTags){
        activeContainer.appendChild(makeChip(tag, state.selectedActiveTags, (t) => {
          state.selectedActiveTags.has(t) ? state.selectedActiveTags.delete(t) : state.selectedActiveTags.add(t);
          buildTagAreas(); render();
        }));
      }
    }

    function buildSelectOptions(){
      const groups = uniq(state.cards.map(c => c.display_group).filter(Boolean)).sort((a,b)=>a.localeCompare(b,'ko'));
      const attrs = uniq(state.cards.map(c => c.display_attribute).filter(Boolean)).sort((a,b)=>a.localeCompare(b,'ko'));
      for (const g of groups){
        const opt = document.createElement('option');
        opt.value = g;
        opt.textContent = g;
        groupSelect.appendChild(opt);
      }
      for (const a of attrs){
        const opt = document.createElement('option');
        opt.value = a;
        opt.textContent = a;
        attributeSelect.appendChild(opt);
      }
    }

    function matchesAnyTag(cardTags, selectedSet){
      if (!selectedSet.size) return true;
      const list = Array.isArray(cardTags) ? cardTags : [];
      return [...selectedSet].some(tag => list.includes(tag));
    }

    function matchesRarity(card){
      if (!state.selectedRarityTags.size) return true;
      return state.selectedRarityTags.has(card.rarity_base);
    }

    function matchesSearch(card, search){
      if (!search) return true;
      const leaderLines = leaderSummaryLines(card).map(x=>x[1]).join(' ');
      const activeLines = activeSummaryLines(card).map(x=>x[1]).join(' ');
      const hay = [
        card.display_id, card.display_title, card.display_subname, card.display_group, card.display_attribute,
        card.rarity_display, leaderLines, activeLines
      ].join(' ').toLowerCase();
      return hay.includes(search.toLowerCase());
    }

    function sortCards(cards){
      if (state.sort === 'name') return cards.sort((a,b)=>String(a.display_title).localeCompare(String(b.display_title),'ko'));
      return cards.sort((a,b)=>Number(a.id || 0) - Number(b.id || 0));
    }

    function filterCards(){
      const filtered = state.cards.filter(card => {
        if (state.group && card.display_group !== state.group) return false;
        if (state.attribute && card.display_attribute !== state.attribute) return false;
        if (!matchesRarity(card)) return false;
        if (!matchesAnyTag(card.leader_tags_calc, state.selectedLeaderTags)) return false;
        if (!matchesAnyTag(card.active_tags_calc, state.selectedActiveTags)) return false;
        if (!matchesSearch(card, state.search)) return false;
        return true;
      });
      return sortCards(filtered);
    }

    function renderSkillBox(label, lines, rawText){
      const content = lines.length
        ? lines.map(([tag, line]) => `<div class="summary-line"><span class="summary-tag">${escapeHtml(tag)}</span>${escapeHtml(line)}</div>`).join('')
        : `<div class="summary-line">해당 조건에 맞는 태그 요약이 없습니다.</div>`;
      const raw = rawText
        ? `<details class="raw"><summary>원문 보기</summary><pre>${escapeHtml(rawText)}</pre></details>`
        : '';
      return `<div class="skill-box"><div class="skill-label">${escapeHtml(label)}</div>${content}${raw}</div>`;
    }

    function render(){
      const filtered = filterCards();
      resultCount.textContent = `표시 카드 수: ${filtered.length.toLocaleString()} / 전체 ${state.cards.length.toLocaleString()}`;

      if (!filtered.length){
        cardGrid.innerHTML = `<div class="empty">조건에 맞는 카드가 없습니다.</div>`;
        return;
      }

      cardGrid.innerHTML = filtered.map(card => {
        const thumbHtml = card.thumb_url
          ? `<img class="thumb" src="${escapeHtml(card.thumb_url)}" alt="${escapeHtml(card.display_title)}" loading="lazy" referrerpolicy="no-referrer" />`
          : `<div class="thumb-fallback">이미지 없음</div>`;
        const wikiLink = card.wiki_url
          ? `<a class="link" href="${escapeHtml(card.wiki_url)}" target="_blank" rel="noopener noreferrer">위키 페이지 열기</a>`
          : '';
        const meta = [
          card.rarity_display ? `<span class="badge">${escapeHtml(card.rarity_display)}</span>` : '',
          card.display_group ? `<span class="badge">${escapeHtml(card.display_group)}</span>` : '',
          card.display_attribute ? `<span class="badge">${escapeHtml(card.display_attribute)}</span>` : ''
        ].join('');
        const subtitle = [card.display_id ? `ID ${escapeHtml(card.display_id)}` : '', card.display_subname ? escapeHtml(card.display_subname) : ''].filter(Boolean).join(' · ');

        return `
          <article class="card">
            <div class="card-top">
              <div>${thumbHtml}</div>
              <div>
                <h2 class="title">${escapeHtml(card.display_title)}</h2>
                <div class="sub">${subtitle}</div>
                <div class="meta">${meta}</div>
              </div>
            </div>
            <div class="body">
              ${renderSkillBox('리더 스킬 요약', leaderSummaryLines(card), card.leader_skill_text || '')}
              ${renderSkillBox('액티브 스킬 요약', activeSummaryLines(card), card.active_skill_text || '')}
            </div>
            <div class="footer">${wikiLink}</div>
          </article>`;
      }).join('');
    }

    async function loadCards(){
      loadState.textContent = 'cards.json 불러오는 중...';
      try{
        const res = await fetch('./cards.json', {cache:'no-store'});
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const raw = await res.json();
        state.cards = normalizeCards(raw);
        buildSelectOptions();
        buildTagAreas();
        render();
        loadState.textContent = '로드 완료';
      }catch(err){
        console.error(err);
        loadState.textContent = '로드 실패';
        cardGrid.innerHTML = `<div class="empty">
          cards.json을 읽지 못했습니다.<br><br>
          GitHub Pages 또는 로컬 서버에서 같은 폴더에 cards.json이 있는지 확인해 주세요.
        </div>`;
      }
    }

    searchInput.addEventListener('input', e => { state.search = e.target.value.trim(); render(); });
    groupSelect.addEventListener('change', e => { state.group = e.target.value; render(); });
    attributeSelect.addEventListener('change', e => { state.attribute = e.target.value; render(); });
    sortSelect.addEventListener('change', e => { state.sort = e.target.value; render(); });

    document.getElementById('clearLeader').onclick = () => { state.selectedLeaderTags.clear(); buildTagAreas(); render(); };
    document.getElementById('clearActive').onclick = () => { state.selectedActiveTags.clear(); buildTagAreas(); render(); };
    document.getElementById('clearRarity').onclick = () => { state.selectedRarityTags.clear(); buildTagAreas(); render(); };
    document.getElementById('clearAll').onclick = () => {
      state.selectedLeaderTags.clear();
      state.selectedActiveTags.clear();
      state.selectedRarityTags.clear();
      state.search=''; state.group=''; state.attribute=''; state.sort='id';
      searchInput.value=''; groupSelect.value=''; attributeSelect.value=''; sortSelect.value='id';
      buildTagAreas(); render();
    };

    loadCards();
  </script>
</body>
</html>
